name: Package compilation baseline

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  measure:
    name: Measure packages (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Lazarus (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lazarus

      - name: Install Lazarus (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install lazarus -y --no-progress

      - name: Compile every tracked package
        id: baseline
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $resultDir = Join-Path $PWD 'baseline-results'
          $logDir = Join-Path $resultDir 'logs'
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null

          $lazbuild = Get-Command lazbuild -ErrorAction SilentlyContinue
          if (-not $lazbuild -and $env:RUNNER_OS -eq 'Windows') {
            $candidate = Get-ChildItem -Path 'C:\lazarus*' -Filter lazbuild.exe -File -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1
            if ($candidate) { $lazbuild = $candidate }
          }
          if (-not $lazbuild) { throw 'lazbuild was not found after installing Lazarus.' }

          $rows = [System.Collections.Generic.List[string]]::new()
          foreach ($package in (Get-ChildItem 'pacote/packages/*.lpk' -File | Sort-Object Name)) {
            $log = Join-Path $logDir ($package.BaseName + '.log')
            & $lazbuild.Source $package.FullName 2>&1 | Tee-Object -FilePath $log
            $exitCode = $LASTEXITCODE
            $status = if ($exitCode -eq 0) { 'PASS' } else { 'FAIL' }
            $message = if ($exitCode -eq 0) {
              '-'
            } else {
              $lastLine = Get-Content -LiteralPath $log | Where-Object { $_.Trim() } | Select-Object -Last 1
              if ($lastLine) { ($lastLine -replace "`t", ' ' -replace "`r|`n", ' ') } else { "lazbuild exit $exitCode" }
            }
            $rows.Add("$($package.Name)`t$env:RUNNER_OS`t$status`t$message")
          }

          $rows | Set-Content -LiteralPath (Join-Path $resultDir "$env:RUNNER_OS.tsv") -Encoding utf8
          if ($rows.Count -ne 16) { throw "Expected 16 packages, measured $($rows.Count)." }

      - name: Upload raw baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-baseline-${{ runner.os }}
          path: baseline-results/

  consolidate:
    name: Consolidate 16 x 2 baseline
    if: always()
    needs: measure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: package-baseline-*
          path: downloaded-results

      - name: Build baseline report
        shell: pwsh
        run: |
          $rows = Get-ChildItem 'downloaded-results' -Filter '*.tsv' -File -Recurse |
            ForEach-Object { Get-Content -LiteralPath $_.FullName -Encoding utf8 } |
            Where-Object { $_.Trim() } |
            ForEach-Object {
              $fields = $_ -split "`t", 4
              [pscustomobject]@{ Package=$fields[0]; OS=$fields[1]; Status=$fields[2]; Message=$fields[3] }
            } |
            Sort-Object Package, OS

          $out = [System.Collections.Generic.List[string]]::new()
          $out.Add('# Lazarus AI Suite - Package Compilation Baseline')
          $out.Add('')
          $out.Add("Generated by GitHub Actions at $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC').")
          $out.Add('')
          $out.Add('| Package | OS | Result | Build message |')
          $out.Add('|---|---|---|---|')
          foreach ($row in $rows) {
            $message = $row.Message -replace '\|', '\|'
            $out.Add("| ``$($row.Package)`` | $($row.OS) | $($row.Status) | $message |")
          }
          $out.Add('')
          $out.Add("Measured results: $($rows.Count) (expected: 32).")
          New-Item -ItemType Directory -Force -Path DOC | Out-Null
          $out | Set-Content -LiteralPath 'DOC/FGX_STABILIZATION_BASELINE.md' -Encoding utf8
          if ($rows.Count -ne 32) { throw "Expected 32 results, consolidated $($rows.Count)." }

      - name: Publish consolidated baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fgx-stabilization-baseline
          path: DOC/FGX_STABILIZATION_BASELINE.md
