services:
  postgres:
    image: postgres:16-alpine
    container_name: maurinsoft_chatgpt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: maurinsoft_chatgpt
      POSTGRES_USER: chatgpt
      POSTGRES_PASSWORD: chatgpt123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatgpt -d maurinsoft_chatgpt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
